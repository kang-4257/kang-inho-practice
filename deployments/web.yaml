apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-web
  namespace: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
      - name: fastapi
        image: ongf/team02-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        securityContext:          
          allowPrivilegeEscalation: false  
          runAsNonRoot: true
          runAsUser: 1000                
          capabilities:
            drop: ["ALL"]                   
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
        periodSeconds: 10
        resources:
          limits:
            cpu: "200m"         
            memory: "256Mi"
          requests:
            cpu: "100m"         
            memory: "128Mi"
        env:
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fastapi-db-secret
              key: db-password
        - name: DB_HOST
          value: "postgres-service.db"  
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "board"
        
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: web-secret
              key: api-key
        # --- 볼륨 마운트 위치 (컨테이너 내부) ---
        volumeMounts:
        - name: db-persistent-storage
          mountPath: /app/database
      
      # --- 실제 볼륨 정의 위치 (컨테이너 외부) ---
      volumes:
      - name: db-persistent-storage
        hostPath:
          path: /home/user/kang-inho/db-data
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-web
  namespace: web
spec:
  type: NodePort  
  selector:
    app: fastapi
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30080
