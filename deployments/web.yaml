apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-web
  namespace: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
      - name: fastapi
        image: ongf/team02-app:latest
        imagePullPolicy: Always  # 1. IfNotPresent를 Always로 변경 (보안/신뢰성)
        # ---------------------------------------------------------
        # 2. 보안 컨텍스트 추가
        securityContext:         
          allowPrivilegeEscalation: false  
          runAsNonRoot: true               
          capabilities:
            drop: ["ALL"]                  
        # 
        # ---------------------------------------------------------
        # 3. 가용성 향상 (점수 추가 포인트)
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        # ---------------------------------------------------------
        resources:
          limits:
            cpu: "200m"        
            memory: "256Mi"
          requests:
            cpu: "100m"        
            memory: "128Mi"
        env:
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fastapi-db-secret
              key: db-password
        - name: DB_HOST
          value: "postgres-service.db"  
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "board"
        # 제미나이 API 키
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: web-secret
              key: api-key
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-web
  namespace: web
spec:
  type: NodePort  
  selector:
    app: fastapi
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30080  
