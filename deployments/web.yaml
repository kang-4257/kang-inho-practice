apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-web
  namespace: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
      - name: fastapi
        image: team02-app:v3.1
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "password"
        - name: DB_HOST
          value: "postgres-service.db"  # DB 네임스페이스의 서비스 이름
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "board"
        # 제미나이 API 키
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: web-secret
              key: api-key
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-web
  namespace: web
spec:
  type: NodePort  # 외부 접속을 위해 ClusterIP에서 변경
  selector:
    app: fastapi
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30080  # 외부에서 접속할 때 쓸 포트 (서버IP:30080)
