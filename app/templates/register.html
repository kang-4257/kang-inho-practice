<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Register - Security Board</title>
    <link rel="stylesheet" href="/static/css/style.css?v=3">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <span class="shield-icon">🛡️</span>
                <h1>Security <span>Board</span></h1>
            </div>
            <p style="color:#94a3b8; font-size:0.9rem; margin-bottom:1.5rem;">새 계정 만들기</p>

            <script>
                const params = new URLSearchParams(window.location.search);
                if (params.get('error') === 'exists') {
                    document.addEventListener('DOMContentLoaded', () => {
                        document.getElementById('error-msg').style.display = 'block';
                    });
                }
            </script>

            <form action="/register" method="post">
                <div class="input-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" placeholder="Username" required autofocus>
                </div>
                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                </div>
                <p id="error-msg" style="color:#ef4444; font-size:0.85rem; display:none; margin-top:0.5rem;">
                    이미 존재하는 아이디입니다.
                </p>
                <button type="submit" class="btn-login">계정 생성</button>
            </form>

            <div class="login-footer">
                <a href="/">로그인으로 돌아가기</a>
            </div>
        </div>
    </div>
</body>
</html>
