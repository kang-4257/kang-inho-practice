<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글쓰기 - Security Board</title>
    <link rel="stylesheet" href="/static/css/style.css?v=6">
</head>
<body class="dashboard-page">
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <span class="shield-icon">🛡️</span>
                <h2>Security Board</h2>
            </div>
            <div class="user-info">
                <span class="user-avatar">👤</span>
                <span class="user-name">{{ current_user.username }}</span>
            </div>
            <ul class="nav-links">
                <li><a href="/main">🏠 전체 게시판</a></li>
                <li><a href="/my-posts">📝 내가 쓴 글</a></li>
                <li class="active"><a href="/write">✏️ 글쓰기</a></li>
                <li class="logout-item"><a href="/logout">🚪 로그아웃</a></li>
            </ul>  
        </nav>

        <main class="content">
            <div class="write-box">
                <h2>새 글 작성</h2>
                <form action="/write" method="post">
                    <div class="form-group">
                        <label>제목</label>
                        <input type="text" name="title" placeholder="제목을 입력하세요" required>
                    </div>
                    <div class="form-group">
                        <label>내용</label>
                        <textarea name="content" rows="12" placeholder="내용을 입력하세요..." required></textarea>
                    </div>
                    <div class="write-buttons">
                        <button type="button" class="btn-secondary" onclick="history.back()">취소</button>
                        <button type="submit" class="btn-write">게시글 등록</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
