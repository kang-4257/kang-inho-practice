<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Write - Security Board</title>
    <link rel="stylesheet" href="/static/css/style.css?v=6">
</head>
<body class="dashboard-page">
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <span class="shield-icon">🛡️</span>
                <h2>Security Board</h2>
            </div>
            <ul class="nav-links">
                <li><a href="/main">📊 대시보드</a></li>
                <li><a href="#">🕵️ 보안 로그</a></li>
                <li><a href="#">👥 사용자 관리</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="/logout" class="btn-logout">로그아웃</a>
            </div>
        </nav>

        <main class="content">
            <div class="write-box">
                <h2>새 보안 리포트 작성</h2>
                <form action="/write" method="post">
                    <div class="form-group">
                        <label>제목</label>
                        <input type="text" name="title" placeholder="취약점 명칭 또는 제목을 입력하세요" required>
                    </div>
                    <div class="form-group">
                        <label>위험 레벨</label>
                        <select name="status">
                            <option value="low">Low (안전)</option>
                            <option value="medium">Medium (주의)</option>
                            <option value="high">High (위험)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>상세 내용</label>
                        <textarea name="content" rows="10" placeholder="상세한 보안 위협 내용을 입력하세요..." required></textarea>
                    </div>
                    <div class="write-buttons">
                        <button type="button" class="btn-secondary" onclick="history.back()">취소</button>
                        <button type="submit" class="btn-write">리포트 제출</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
