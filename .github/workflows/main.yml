name: DevSecOps-Pipeline-Auto-Scan

# 개인 저장소(main)와 조직 저장소(backup) 모두에서 작동하도록 설정
on:
  push:
    branches: [ "main", "backup" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      # 1. 소스 코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Trivy를 이용한 보안 스캔 (파일로 저장)
      - name: Run Trivy Scan
        run: |
          # 설치 및 스캔 실행 (결과를 trivy-report.txt에 저장)
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy fs --severity CRITICAL,HIGH --format table . > trivy-report.txt
          
          # 로그 확인용 (파일이 잘 생성됐는지 터미널에 출력)
          echo "--- Trivy Scan Result ---"
          cat trivy-report.txt

      # 3. Gemini 분석 전에 필요한 라이브러리 설치
      - name: Install Python Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install google-generativeai

      # 4. Gemini AI 분석 및 리포트 파일 생성 강제화
      - name: Gemini AI Analysis
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
        
          python3 .github/scripts/gemini_analysis.py > gemini-analysis.txt

          # [검증 로직] 파일이 비어있는지 체크하여 이슈 생성 실패 방지
          if [ -s gemini-analysis.txt ]; then
            echo "✅ Gemini 분석 파일 생성 완료!"
            ls -l gemini-analysis.txt
          else
            echo "⚠️ 분석 결과가 비어있습니다. 기본 메시지를 생성합니다."
            echo "Gemini 분석 리포트 생성에 실패했거나 취약점이 없습니다. 상세 내용은 Actions 로그를 확인하세요." > gemini-analysis.txt
          fi

      # 4. GitHub Issue 생성 (검증된 파일 경로 사용)
      - name: Create Issue
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "🚨 [보안 알림] Gemini AI 취약점 분석 리포트"
          content-filepath: ./gemini-analysis.txt
          labels: |
            security
            automated
          body: |
            ## 🔍 Trivy + Gemini 분석 결과
            
            ${{ env.ANALYSIS }}
            
            ---
            *담당자: @${{ github.actor }}*
            *결과 확인 후 조치 완료 시 이슈를 닫아주세요.*
          token: ${{ secrets.GITHUB_TOKEN }}
