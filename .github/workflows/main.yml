name: DevSecOps-Pipeline-Auto-Scan

on:
  push:
    branches: [ "main", "backup" ]
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - '.github/**'
      - 'deployments/**'  
      - 'k3s/**'
      - 'static/**'    
      - 'templates/**' 
      - 'app/**'

jobs:
  security-and-deploy:
    runs-on: self-hosted 
    steps:
      # 1. 소스 코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 도커 허브 로그인
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      # 3. 도커 이미지 빌드
      - name: Build Docker Image
        run: |
          SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/team02-app:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/team02-app:$SHORT_SHA .
          echo "IMAGE_TAG=$SHORT_SHA" >> $GITHUB_ENV

      # 4. Trivy 보안 스캔 (table - GitHub Issue용)
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ secrets.DOCKER_USERNAME }}/team02-app:latest'
          format: 'table'
          output: 'trivy-report.txt'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          scanners: 'vuln,config,secret'

      # 4-1. Trivy 보안 스캔 (json - CVE 파싱용)
      - name: Run Trivy Scan JSON
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ secrets.DOCKER_USERNAME }}/team02-app:latest'
          format: 'json'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          scanners: 'vuln'

      # 5. Trivy 결과 확인
      - name: Check Trivy Report
        run: |
          if [ -s trivy-report.txt ]; then
            echo "--- Trivy 스캔 성공 ---"
            head -n 20 trivy-report.txt
          else
            echo "--- Trivy 스캔 결과 없음 ---"
          fi

      # 6. Python 의존성 설치
      - name: Install Python Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install requests pytz

      # 7. Groq AI 분석 + DB 저장
      - name: Groq AI Analysis
        id: groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          python3 .github/scripts/groq_analysis.py > gemini-analysis.txt
          if [ -s gemini-analysis.txt ]; then
            echo "✅ Groq 분석 완료"
          else
            echo "⚠️ 분석 결과 없음"
            echo "분석 리포트 생성 실패 혹은 취약점 없음." > gemini-analysis.txt
          fi

      # 8. GitHub Issue 생성
      - name: Create Issue
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "🚨 [보안 알림] Groq AI 취약점 분석 리포트"
          content-filepath: ./gemini-analysis.txt
          labels: |
            security
            automated
          token: ${{ secrets.GITHUB_TOKEN }}

      # 9. 보안 게이트: Critical 취약점 발견 시 배포 중단
      - name: Security Gate
        run: |
          CRITICAL=$(cat trivy-report.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length')
          echo "Critical 취약점 수: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Critical 취약점 ${CRITICAL}개 발견 - 배포를 중단합니다."
            echo "GitHub Issue의 AI 보고서를 확인하고 취약점을 수정한 후 다시 푸시해주세요."
            exit 1
          else
            echo "✅ Critical 취약점 없음 - 배포를 진행합니다."
          fi

      # 10. 도커 허브에 이미지 업로드
      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/team02-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/team02-app:${{ env.IMAGE_TAG }}

      # 11. k3s 클러스터에 배포
      - name: Deploy to K3s
        run: |
          kubectl create namespace web --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f deployments/
          kubectl set image deployment/fastapi-web fastapi=${{ secrets.DOCKER_USERNAME }}/team02-app:${{ env.IMAGE_TAG }} -n web
          kubectl rollout status deployment fastapi-web -n web

      # 12. 배포 후 Trivy 재스캔
      - name: Post Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ secrets.DOCKER_USERNAME }}/team02-app:${{ env.IMAGE_TAG }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln'

      # 13. 코드 체크아웃 확인
      - name: Post Checkout code
        uses: actions/checkout@v3
